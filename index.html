<!DOCTYPE html>
<html>
<head>
  <title>Mapa de Sinal</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    #map { height: 100vh; }

    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
    }

    .legend div {
      cursor: pointer;
      margin: 4px 0;
    }

    .legend img {
      width: 18px;
      margin-right: 6px;
    }

    .chart-box {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<script>

const map = L.map('map').setView([-28.82, -49.27], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ÍCONES
function getIcon(signal) {
  const mapIcons = {
    "0":     "marker-black.png",
    "1":     "marker-red.png",
    "2":     "marker-orange.png",
    "3":     "marker-green.png",
    "TORRE": "tower.png"          // ← NOVO
  };

  return L.icon({
    iconUrl: mapIcons[signal] || "marker-green.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });
}

// CLUSTERS
let clusterVivo = L.layerGroup();
let clusterTim  = L.layerGroup();

// CAMADAS
const overlays = {
  "VIVO": clusterVivo,
  "TIM":  clusterTim
};

L.control.layers(null, overlays).addTo(map);

// FILTRO SINAL
let filtroAtivo = null;
let stats = { "0":0, "1":0, "2":0, "3":0, "TORRE":0 };  // ← NOVO

// CSV LOADER
async function loadCSV(url, cluster, rede) {

  const res  = await fetch(url + '?' + Date.now());
  const text = await res.text();
  const lines = text.split(/\r?\n/);

  for (let i = 1; i < lines.length; i++) {

    let line = lines[i].trim();
    if (!line) continue;

    const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if (!parts || parts.length < 4) continue;

    const coords = parts[0].replace(/"/g, '').split(",");
    const sinal  = parts[1].trim();   // pode ser "0","1","2","3" ou "TORRE"

    if (filtroAtivo && sinal !== filtroAtivo) continue;

    const lat = parseFloat(coords[0]);
    const lng = parseFloat(coords[1]);

    if (isNaN(lat) || isNaN(lng)) continue;

    // contabiliza apenas chaves conhecidas
    if (stats.hasOwnProperty(sinal)) stats[sinal]++;

    const marker = L.marker([lat, lng], {
      icon: getIcon(sinal)
    }).bindPopup(`${rede} - ${sinal === "TORRE" ? "Torre" : "Sinal " + sinal}`);

    cluster.addLayer(marker);
  }
}

// ATUALIZAR
function atualizar() {

  clusterVivo.clearLayers();
  clusterTim.clearLayers();

  stats = { "0":0, "1":0, "2":0, "3":0, "TORRE":0 };  // ← NOVO

  loadCSV('vivo.csv', clusterVivo, 'VIVO');
  loadCSV('tim.csv',  clusterTim,  'TIM');

  setTimeout(updateChart, 500);
}

// CHART
let chart = new Chart(document.getElementById('chart'), {
  type: 'doughnut',
  data: {
    labels: ['Sem sinal', 'Baixo', 'Médio', 'Total', 'Torre'],   // ← NOVO
    datasets: [{
      data: [0, 0, 0, 0, 0],
      backgroundColor: ['#222', '#e74c3c', '#e67e22', '#2ecc71', '#3498db']  // ← NOVO
    }]
  }
});

function updateChart() {
  chart.data.datasets[0].data = [
    stats["0"],
    stats["1"],
    stats["2"],
    stats["3"],
    stats["TORRE"]   // ← NOVO
  ];
  chart.update();
}

// LEGENDA (SINAL)
const legend = L.control({ position: 'bottomright' });

legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');

  div.innerHTML = `
    <b>Sinal</b><br>
    <div onclick="filtrar(null)">           <img src="marker-green.png"> Todos</div>
    <div onclick="filtrar('0')">            <img src="marker-black.png"> Sem sinal</div>
    <div onclick="filtrar('1')">            <img src="marker-red.png">   Baixo</div>
    <div onclick="filtrar('2')">            <img src="marker-orange.png"> Médio</div>
    <div onclick="filtrar('3')">            <img src="marker-green.png"> Total</div>
    <div onclick="filtrar('TORRE')">        <img src="tower.png">        Torre</div>
  `;

  return div;
};

legend.addTo(map);

// FILTRO
window.filtrar = function(v) {
  filtroAtivo = v;
  atualizar();
};

// LOOP
setInterval(atualizar, 30000);

atualizar();

</script>

</body>
</html>
