<!DOCTYPE html>
<html>
<head>
  <title>Mapa de Sinal</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// Inicializa mapa
const map = L.map('map').setView([-28.82, -49.27], 13);

// Base OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// 🎨 Função de cor
function getColor(signal) {
  if (signal == "0") return "black";   // sem sinal
  if (signal == "1") return "red";     // baixo
  if (signal == "2") return "orange";  // médio
  if (signal == "3") return "green";   // total
  return "gray";
}

// Camadas
let layerVivo = L.layerGroup().addTo(map);
let layerTim = L.layerGroup().addTo(map);

// 🔥 Função para ler CSV com aspas
async function loadCSV(url, layer, rede) {
  try {
    const response = await fetch(url + '?' + Date.now());
    const text = await response.text();

    const lines = text.split(/\r?\n/);

    for (let i = 1; i < lines.length; i++) {
      let line = lines[i].trim();
      if (!line) continue;

      // separa respeitando aspas
      const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

      if (!parts || parts.length < 4) continue;

      const localizacao = parts[0].replace(/"/g, '').trim();
      const sinal = parts[1].trim();
      const ligacao = parts[2].trim();
      const streaming = parts[3].trim();

      const coords = localizacao.split(",");

      if (coords.length < 2) continue;

      const lat = parseFloat(coords[0]);
      const lng = parseFloat(coords[1]);

      if (isNaN(lat) || isNaN(lng)) continue;

      L.circleMarker([lat, lng], {
        radius: 6,
        color: getColor(sinal)
      })
      .bindPopup(`
        <b>${rede}</b><br>
        Sinal: ${sinal}<br>
        Ligação: ${ligacao}<br>
        Streaming: ${streaming}
      `)
      .addTo(layer);
    }

  } catch (e) {
    console.error("Erro ao carregar CSV:", e);
  }
}

// Atualiza mapa
function atualizarMapa() {
  layerVivo.clearLayers();
  layerTim.clearLayers();

  loadCSV('vivo.csv', layerVivo, 'VIVO');
  loadCSV('tim.csv', layerTim, 'TIM');
}

// Controle de camadas
const overlays = {
  "VIVO": layerVivo,
  "TIM": layerTim
};

L.control.layers(null, overlays).addTo(map);

// Atualiza a cada 30s
setInterval(atualizarMapa, 30000);

// Primeira carga
atualizarMapa();

</script>

</body>
</html>
