<!DOCTYPE html>
<html>
<head>
  <title>Mapa de Sinal</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Cluster -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- Chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    #map { height: 100vh; }

    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
    }

    .legend div {
      cursor: pointer;
      margin: 4px 0;
    }

    .legend img {
      width: 18px;
      margin-right: 6px;
    }

    .chart-box {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      width: 250px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

<div id="map"></div>
<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<script>
const map = L.map('map').setView([-28.82, -49.27], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ícones
function getIcon(signal) {
  const mapIcons = {
    "0": "marker-black.png",
    "1": "marker-red.png",
    "2": "marker-orange.png",
    "3": "marker-green.png"
  };

  return L.icon({
    iconUrl: mapIcons[signal] || "marker-green.png",
    iconSize: [32,32],
    iconAnchor: [16,32]
  });
}

// clusters
let clusterVivo = L.markerClusterGroup();
let clusterTim = L.markerClusterGroup();

map.addLayer(clusterVivo);
map.addLayer(clusterTim);

// filtro
let filtroAtivo = null;

// contagem
let stats = {0:0,1:0,2:0,3:0};

// carregar CSV
async function loadCSV(url, cluster, rede) {
  const res = await fetch(url + '?' + Date.now());
  const text = await res.text();

  const lines = text.split(/\r?\n/);

  for (let i = 1; i < lines.length; i++) {
    let line = lines[i].trim();
    if (!line) continue;

    const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if (!parts || parts.length < 4) continue;

    const coords = parts[0].replace(/"/g,'').split(",");
    const sinal = parts[1].trim();

    if (filtroAtivo && sinal != filtroAtivo) continue;

    const lat = parseFloat(coords[0]);
    const lng = parseFloat(coords[1]);

    if (isNaN(lat) || isNaN(lng)) continue;

    stats[sinal]++;

    const marker = L.marker([lat,lng], { icon: getIcon(sinal) })
      .bindPopup(`${rede} - Sinal ${sinal}`);

    cluster.addLayer(marker);
  }
}

// atualizar tudo
function atualizar() {
  clusterVivo.clearLayers();
  clusterTim.clearLayers();

  stats = {0:0,1:0,2:0,3:0};

  loadCSV('vivo.csv', clusterVivo, 'VIVO');
  loadCSV('tim.csv', clusterTim, 'TIM');

  setTimeout(updateChart, 500);
}

// gráfico
let chart = new Chart(document.getElementById('chart'), {
  type: 'doughnut',
  data: {
    labels: ['Sem sinal','Baixo','Médio','Total'],
    datasets: [{
      data: [0,0,0,0]
    }]
  }
});

function updateChart() {
  chart.data.datasets[0].data = [
    stats[0],
    stats[1],
    stats[2],
    stats[3]
  ];
  chart.update();
}

// legenda clicável
const legend = L.control({position: 'bottomright'});

legend.onAdd = function() {
  const div = L.DomUtil.create('div','legend');

  div.innerHTML = `
    <b>Filtrar</b>
    <div onclick="filtrar(null)"><img src="marker-green.png"> Todos</div>
    <div onclick="filtrar('0')"><img src="marker-black.png"> Sem sinal</div>
    <div onclick="filtrar('1')"><img src="marker-red.png"> Baixo</div>
    <div onclick="filtrar('2')"><img src="marker-orange.png"> Médio</div>
    <div onclick="filtrar('3')"><img src="marker-green.png"> Total</div>
  `;

  return div;
};

legend.addTo(map);

// função filtro
window.filtrar = function(valor) {
  filtroAtivo = valor;
  atualizar();
};

// atualiza a cada 30s
setInterval(atualizar, 30000);

// inicial
atualizar();

</script>

</body>
</html>
