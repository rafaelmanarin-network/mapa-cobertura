<!DOCTYPE html>
<html>
<head>
  <title>Mapa de Sinal</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <style>
    #map { height: 100vh; }

    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
    }

    .legend div {
      cursor: pointer;
      margin: 4px 0;
    }

    .legend img {
      width: 18px;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([-28.82, -49.27], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const sinalConfig = {
  "0": { radius: 0,   color: '#000000' },
  "1": { radius: 150, color: '#e74c3c' },
  "2": { radius: 300, color: '#e67e22' },
  "3": { radius: 400, color: '#2ecc71' }
};

const sinalNome = {
  "0": "Sem sinal",
  "1": "Baixo",
  "2": "Médio",
  "3": "Forte"
};

function getIcon(signal) {
  const mapIcons = {
    "0":     "marker-black.png",
    "1":     "marker-red.png",
    "2":     "marker-orange.png",
    "3":     "marker-green.png",
    "TORRE": "tower.png"
  };
  return L.icon({
    iconUrl: mapIcons[signal] || "marker-green.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32]
  });
}

function criarClusterTorres() {
  return L.markerClusterGroup({
    iconCreateFunction: function(cluster) {
      const count = cluster.getChildCount();
      return L.divIcon({
        html: `<div style="position:relative; display:inline-block;">
                 <img src="tower.png" style="width:32px; height:32px; display:block;">
                 <span style="
                   position: absolute;
                   top: -6px;
                   right: -8px;
                   background: #1a3a5c;
                   color: white;
                   border-radius: 50%;
                   padding: 1px 5px;
                   font-size: 11px;
                   font-weight: bold;
                   line-height: 16px;
                   min-width: 16px;
                   text-align: center;
                   box-shadow: 0 0 3px rgba(0,0,0,0.4);
                 ">${count}</span>
               </div>`,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 32]
      });
    }
  });
}

const vivoSinal   = L.layerGroup().addTo(map);
const vivoTorres  = criarClusterTorres().addTo(map);
const timSinal    = L.layerGroup().addTo(map);
const timTorres   = criarClusterTorres().addTo(map);
const alcanceVivo = L.layerGroup().addTo(map);
const alcanceTim  = L.layerGroup().addTo(map);

L.control.layers(null, {
  "VIVO Sinal":        vivoSinal,
  "VIVO Torre":        vivoTorres,
  "VIVO Área Alcance": alcanceVivo,
  "TIM Sinal":         timSinal,
  "TIM Torre":         timTorres,
  "TIM Área Alcance":  alcanceTim
}).addTo(map);

let filtroAtivo = null;

async function loadCSV(url, layerSinal, layerTorres, layerAlcance, rede) {
  const res   = await fetch(url + '?' + Date.now());
  const text  = await res.text();
  const lines = text.split(/\r?\n/);

  for (let i = 1; i < lines.length; i++) {
    let line = lines[i].trim();
    if (!line) continue;

    const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
    if (!parts || parts.length < 4) continue;

    const coords     = parts[0].replace(/"/g, '').split(",");
    const sinal      = parts[1].trim();
    const ligacao    = parts[2] ? parts[2].trim() : '-';
    const streaming  = parts[3] ? parts[3].trim() : '-';

    if (filtroAtivo && sinal !== filtroAtivo) continue;

    const lat = parseFloat(coords[0]);
    const lng = parseFloat(coords[1]);
    if (isNaN(lat) || isNaN(lng)) continue;

    let popupContent;
    if (sinal === "TORRE") {
      popupContent = `
        <b>${rede} — Torre</b><br>
        <b>Tecnologia:</b> ${ligacao}
      `;
    } else {
      popupContent = `
        <b>${rede}</b><br>
        <b>Sinal:</b> ${sinalNome[sinal] || sinal}<br>
        <b>Ligação:</b> ${ligacao}<br>
        <b>Streaming:</b> ${streaming}
      `;
    }

    const marker = L.marker([lat, lng], {
      icon: getIcon(sinal)
    }).bindPopup(popupContent);

    if (sinal === "TORRE") {
      if (map.hasLayer(layerTorres)) layerTorres.addLayer(marker);
    } else {
      if (map.hasLayer(layerSinal)) layerSinal.addLayer(marker);

      const cfg = sinalConfig[sinal];
      if (cfg && cfg.radius > 0 && map.hasLayer(layerAlcance)) {
        const circle = L.circle([lat, lng], {
          radius:      cfg.radius,
          color:       cfg.color,
          fillColor:   cfg.color,
          fillOpacity: 0.10,
          opacity:     0.4,
          weight:      1.5
        });
        layerAlcance.addLayer(circle);
      }
    }
  }
}

function atualizar() {
  vivoSinal.clearLayers();
  timSinal.clearLayers();
  alcanceVivo.clearLayers();
  alcanceTim.clearLayers();

  if (filtroAtivo === null || filtroAtivo === 'TORRE') {
    vivoTorres.clearLayers();
    timTorres.clearLayers();
  }

  loadCSV('vivo.csv', vivoSinal, vivoTorres, alcanceVivo, 'VIVO');
  loadCSV('tim.csv',  timSinal,  timTorres,  alcanceTim,  'TIM');
}

const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <b>Sinal</b><br>
    <div onclick="filtrar(null)">     <img src="marker-green.png">  Todos</div>
    <div onclick="filtrar('0')">      <img src="marker-black.png">  Sem sinal</div>
    <div onclick="filtrar('1')">      <img src="marker-red.png">    Baixo</div>
    <div onclick="filtrar('2')">      <img src="marker-orange.png"> Médio</div>
    <div onclick="filtrar('3')">      <img src="marker-green.png">  Forte</div>
    <div onclick="filtrar('TORRE')">  <img src="tower.png">         Torre</div>
  `;
  return div;
};
legend.addTo(map);

window.filtrar = function(v) {
  filtroAtivo = v;
  atualizar();
};

setInterval(atualizar, 30000);

atualizar();

</script>

</body>
</html>
