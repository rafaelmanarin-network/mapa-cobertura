<!DOCTYPE html>
<html>
<head>
  <title>Mapa de Sinal</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }

    /* legenda */
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
      line-height: 18px;
    }

    .legend h4 {
      margin: 0 0 5px;
    }

    .legend img {
      width: 18px;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script>
// Inicializa mapa
const map = L.map('map').setView([-28.82, -49.27], 13);

// Base map
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// 🎨 Ícone por sinal
function getIcon(signal) {
  let iconFile = "marker-green.png";

  if (signal == "0") iconFile = "marker-black.png";
  else if (signal == "1") iconFile = "marker-red.png";
  else if (signal == "2") iconFile = "marker-orange.png";
  else if (signal == "3") iconFile = "marker-green.png";

  return L.icon({
    iconUrl: iconFile,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
  });
}

// Camadas
let layerVivo = L.layerGroup().addTo(map);
let layerTim = L.layerGroup().addTo(map);

// 🔥 Ler CSV
async function loadCSV(url, layer, rede) {
  try {
    const response = await fetch(url + '?' + Date.now());
    const text = await response.text();

    const lines = text.split(/\r?\n/);

    for (let i = 1; i < lines.length; i++) {
      let line = lines[i].trim();
      if (!line) continue;

      const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

      if (!parts || parts.length < 4) continue;

      const localizacao = parts[0].replace(/"/g, '').trim();
      const sinal = parts[1].trim();
      const ligacao = parts[2].trim();
      const streaming = parts[3].trim();

      const coords = localizacao.split(",");

      if (coords.length < 2) continue;

      const lat = parseFloat(coords[0]);
      const lng = parseFloat(coords[1]);

      if (isNaN(lat) || isNaN(lng)) continue;

      L.marker([lat, lng], {
        icon: getIcon(sinal)
      })
      .bindPopup(`
        <b>${rede}</b><br>
        Sinal: ${sinal}<br>
        Ligação: ${ligacao}<br>
        Streaming: ${streaming}
      `)
      .addTo(layer);
    }

  } catch (e) {
    console.error("Erro ao carregar CSV:", e);
  }
}

// Atualizar mapa
function atualizarMapa() {
  layerVivo.clearLayers();
  layerTim.clearLayers();

  loadCSV('vivo.csv', layerVivo, 'VIVO');
  loadCSV('tim.csv', layerTim, 'TIM');
}

// Controle de camadas
const overlays = {
  "VIVO": layerVivo,
  "TIM": layerTim
};

L.control.layers(null, overlays).addTo(map);

// 🧾 LEGENDA
const legend = L.control({ position: "bottomright" });

legend.onAdd = function () {
  const div = L.DomUtil.create("div", "legend");

  div.innerHTML = `
    <h4>Sinal</h4>
    <div><img src="marker-black.png"> Sem sinal</div>
    <div><img src="marker-red.png"> Baixo</div>
    <div><img src="marker-orange.png"> Médio</div>
    <div><img src="marker-green.png"> Total</div>
  `;

  return div;
};

legend.addTo(map);

// Atualiza a cada 30s
setInterval(atualizarMapa, 30000);

// Primeira carga
atualizarMapa();

</script>

</body>
</html>
