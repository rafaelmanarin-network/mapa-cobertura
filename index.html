<!DOCTYPE html>
<html lang="pt-br">
<head>
  <title>Mapa de Sinal - Torres Clusterizadas</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS e JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Leaflet MarkerCluster CSS e JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { margin: 0; padding: 0; font-family: sans-serif; }
    #map { height: 100vh; width: 100%; }

    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      font-size: 14px;
      line-height: 18px;
    }

    .legend div {
      cursor: pointer;
      margin: 4px 0;
      display: flex;
      align-items: center;
    }

    .legend img {
      width: 18px;
      height: 18px;
      margin-right: 8px;
    }

    .chart-box {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    /* Estilo para o contador sobre o ícone da torre */
    .cluster-count-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #3498db;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: bold;
      border: 2px solid white;
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="chart-box">
  <canvas id="chart"></canvas>
</div>

<script>
// Inicialização do Mapa
const map = L.map('map').setView([-28.82, -49.27], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Função para ícones individuais
function getIcon(signal) {
  const mapIcons = {
    "0":     "marker-black.png",
    "1":     "marker-red.png",
    "2":     "marker-orange.png",
    "3":     "marker-green.png",
    "TORRE": "tower.png"
  };

  return L.icon({
    iconUrl: mapIcons[signal] || "marker-green.png",
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -32]
  });
}

// Função para criar o ícone do Cluster (Torre com número)
const customClusterIcon = function (cluster) {
  const count = cluster.getChildCount();
  return L.divIcon({
    html: `
      <div style="position: relative; width: 40px; height: 40px;">
        <img src="tower.png" style="width: 40px; height: 40px;">
        <span class="cluster-count-badge">${count}</span>
      </div>`,
    className: 'custom-cluster-tower',
    iconSize: L.point(40, 40),
    iconAnchor: [20, 40]
  });
};

// Grupos de Sinais (Sempre visíveis)
let layerVivoSinal = L.layerGroup().addTo(map);
let layerTimSinal  = L.layerGroup().addTo(map);

// Grupos de Torres (Clusterizados com ícone customizado)
let clusterVivoTorre = L.markerClusterGroup({ 
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    iconCreateFunction: customClusterIcon 
}).addTo(map);

let clusterTimTorre  = L.markerClusterGroup({ 
    maxClusterRadius: 50,
    showCoverageOnHover: false,
    iconCreateFunction: customClusterIcon 
}).addTo(map);

// Camadas
const overlays = {
  "VIVO (Sinais)": layerVivoSinal,
  "VIVO (Torres)": clusterVivoTorre,
  "TIM (Sinais)": layerTimSinal,
  "TIM (Torres)": clusterTimTorre
};
L.control.layers(null, overlays).addTo(map);

let filtroAtivo = null;
let stats = { "0":0, "1":0, "2":0, "3":0, "TORRE":0 };

// CSV Loader
async function loadCSV(url, clusterTorre, layerSinal, rede) {
  try {
    const res = await fetch(url + '?' + Date.now());
    const text = await res.text();
    const lines = text.split(/\r?\n/);

    for (let i = 1; i < lines.length; i++) {
      let line = lines[i].trim();
      if (!line) continue;

      const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
      if (!parts || parts.length < 4) continue;

      const coordsStr = parts[0].replace(/"/g, '').split(",");
      const sinal = parts[1].trim();

      if (filtroAtivo && sinal !== filtroAtivo) continue;

      const lat = parseFloat(coordsStr[0]);
      const lng = parseFloat(coordsStr[1]);

      if (isNaN(lat) || isNaN(lng)) continue;
      if (stats.hasOwnProperty(sinal)) stats[sinal]++;

      const marker = L.marker([lat, lng], {
        icon: getIcon(sinal)
      }).bindPopup(`<b>${rede}</b><br>${sinal === "TORRE" ? "Torre" : "Sinal: " + sinal}`);

      if (sinal === "TORRE") {
        clusterTorre.addLayer(marker);
      } else {
        layerSinal.addLayer(marker);
      }
    }
  } catch (e) { console.error("Erro no CSV:", e); }
}

function atualizar() {
  clusterVivoTorre.clearLayers();
  layerVivoSinal.clearLayers();
  clusterTimTorre.clearLayers();
  layerTimSinal.clearLayers();

  stats = { "0":0, "1":0, "2":0, "3":0, "TORRE":0 };

  loadCSV('vivo.csv', clusterVivoTorre, layerVivoSinal, 'VIVO');
  loadCSV('tim.csv',  clusterTimTorre,  layerTimSinal,  'TIM');

  setTimeout(updateChart, 800);
}

// Chart.js
let chart = new Chart(document.getElementById('chart'), {
  type: 'doughnut',
  data: {
    labels: ['Sem sinal', 'Baixo', 'Médio', 'Forte', 'Torre'],
    datasets: [{
      data: [0, 0, 0, 0, 0],
      backgroundColor: ['#222', '#e74c3c', '#e67e22', '#2ecc71', '#3498db']
    }]
  },
  options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10 } } } }
});

function updateChart() {
  chart.data.datasets[0].data = [stats["0"], stats["1"], stats["2"], stats["3"], stats["TORRE"]];
  chart.update();
}

// Legenda
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <b>Filtros</b><br>
    <div onclick="filtrar(null)">    <img src="marker-green.png"> Todos</div>
    <div onclick="filtrar('TORRE')"> <img src="tower.png"> Torres</div>
    <div onclick="filtrar('0')">     <img src="marker-black.png"> Sem sinal</div>
    <div onclick="filtrar('1')">     <img src="marker-red.png"> Baixo</div>
    <div onclick="filtrar('2')">     <img src="marker-orange.png"> Médio</div>
    <div onclick="filtrar('3')">     <img src="marker-green.png"> Forte</div>
  `;
  return div;
};
legend.addTo(map);

window.filtrar = function(v) { filtroAtivo = v; atualizar(); };

setInterval(atualizar, 30000);
atualizar();

</script>
</body>
</html>
